name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install unit-test dependencies
        run: >-
          python -m pip install
          pytest pytest-cov ruff numpy datasets PySide6 psutil nvidia-ml-py
      - name: Static checks
        run: python -m ruff check finetuner tests
      - name: Unit tests
        run: python -m pytest -q
